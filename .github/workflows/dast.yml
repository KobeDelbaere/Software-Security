name: DAST Scan

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  dast:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Start Juice Shop
        run: |
          npm install
          npm start &
          sleep 10

      - name: Run OWASP ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.8.0   # <-- Updated version
        with:
          target: 'http://localhost:3000'
          rules_file_name: 'owasp-zap-rules.yml'
          fail_build_on_risk: 'true'

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: zap_report.html

      - name: Install dependencies
        working-directory: ./frontend  # <-- point to the folder with package.json
        run: |
          npm install
          npm start &
          sleep 10