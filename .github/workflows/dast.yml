name: DAST - OWASP ZAP Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 2 * * 1'

jobs:
  zap-scan:
    name: DAST Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start Juice Shop
        run: |
          docker run -d -p 3000:3000 bkimminich/juice-shop

      - name: Wait for Juice Shop to be ready
        run: |
          for i in $(seq 1 20); do
            curl -s http://localhost:3000 > /dev/null && echo "Ready!" && break
            echo "Attempt $i, retrying in 5s..."
            sleep 5
          done     
      - name: Resolve Docker bridge host IP
        run: |
          HOST_IP=$(docker network inspect bridge \
            -f '{{range .IPAM.Config}}{{.Gateway}}{{end}}')
          echo "HOST_IP=$HOST_IP" >> $GITHUB_ENV
          echo "Target: http://$HOST_IP:3000"

      - name: Fix ZAP permissions
        run: |
          mkdir -p ${{ github.workspace }}/zap-wrk
          chmod 777 ${{ github.workspace }}/zap-wrk

      - name: Run OWASP ZAP Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://${{ env.HOST_IP }}:3000'
          fail_action: true
          allow_issue_writing: false