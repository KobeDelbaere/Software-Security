name: Security Checks

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '*/5 * * * *'  # snelle test
  pull_request:
    branches: [ main ]

jobs:
  codeql:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    strategy:
      matrix:
        language: [javascript, python, go]  # voeg hier talen toe die je wilt scannen
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ACTIONS_RUNNER_DEBUG: true
      ACTIONS_STEP_DEBUG: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        if: matrix.language == 'javascript'
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Setup Python
        if: matrix.language == 'python'
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Setup Go
        if: matrix.language == 'go'
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Install dependencies (JS)
        if: matrix.language == 'javascript'
        run: npm ci

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Autobuild
        run: echo "Autobuild skipped for language ${{ matrix.language }}"

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  dependency-review:
    name: Dependency Review (SCA)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Run Dependency Review
        uses: github/dependency-review-action@v3
        with:
          fail-on-severity: high